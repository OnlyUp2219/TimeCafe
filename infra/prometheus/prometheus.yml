global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:${AUTH_PORT}']
    metrics_path: /metrics

  - job_name: 'profile-service'
    static_configs:
      - targets: ['host.docker.internal:${PROFILE_PORT}']
    metrics_path: /metrics

  - job_name: 'venue-service'
    static_configs:
      - targets: ['host.docker.internal:${VENUE_PORT}']
    metrics_path: /metrics

  - job_name: 'billing-service'
    static_configs:
      - targets: ['host.docker.internal:${BILLING_PORT}']
    metrics_path: /metrics

  - job_name: 'audit-service'
    static_configs:
      - targets: ['host.docker.internal:${AUDIT_PORT}']
    metrics_path: /metrics

  - job_name: 'yarp-proxy'
    static_configs:
      - targets: ['host.docker.internal:${YARP_PORT}']
    metrics_path: /metrics
